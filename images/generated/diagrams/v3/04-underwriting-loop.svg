<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1050" viewBox="0 0 1800 1050" role="img" aria-labelledby="title desc">
  <title id="title">Product Spine Underwrite IRL Then Learn</title>
  <desc id="desc">A strong platform diagram showing Analog as an underwriting loop from brief through supply package, campaign funding, spend governance, proof, and unlock recommendation.</desc>
  <defs>
    <style>
      text { font-family: Inter, Arial, sans-serif; letter-spacing: 0; }
      .bg { fill: #fbf7ef; }
      .ink { fill: #171514; }
      .muted { fill: #5f5952; }
      .paper { fill: #fffefa; stroke: #d7cbbc; stroke-width: 2.5; }
      .dark { fill: #171514; }
      .red { fill: #b9362e; }
      .gold { fill: #9b7500; }
      .green { fill: #26796b; }
      .blue { fill: #2f5ea8; }
      .softRed { fill: #fff0ee; stroke: #e6aaa3; stroke-width: 2.5; }
      .softGold { fill: #fff5d6; stroke: #dfc75b; stroke-width: 2.5; }
      .softGreen { fill: #eaf7f2; stroke: #9bcfc3; stroke-width: 2.5; }
      .softBlue { fill: #edf3ff; stroke: #aac1e6; stroke-width: 2.5; }
      .title { font-size: 72px; font-weight: 850; }
      .sub { font-size: 31px; font-weight: 500; }
      .kicker { font-size: 19px; font-weight: 850; text-transform: uppercase; }
      .h { font-size: 38px; font-weight: 820; }
      .m { font-size: 27px; font-weight: 650; }
      .body { font-size: 22px; font-weight: 520; }
      .small { font-size: 18px; font-weight: 650; }
      .line { stroke: #171514; stroke-width: 7; stroke-linecap: round; fill: none; marker-end: url(#arrow); }
      .circleLine { stroke: #171514; stroke-width: 7; stroke-linecap: round; fill: none; }
    </style>
    <marker id="arrow" markerWidth="18" markerHeight="18" refX="15" refY="9" orient="auto">
      <path d="M2,2 L16,9 L2,16 Z" fill="#171514"/>
    </marker>
  </defs>

  <rect class="bg" width="1800" height="1050"/>
  <text class="title ink" x="90" y="105">Product Spine: Underwrite IRL, Then Learn</text>
  <text class="sub muted" x="92" y="153">Every workflow should create product memory, not bespoke services drag.</text>

  <rect class="dark" x="590" y="345" width="620" height="285" rx="36"/>
  <text class="kicker" fill="#f2c94c" x="650" y="415">Product memory</text>
  <text class="h" fill="#fffefa" x="650" y="478">Campaign, host, spend,</text>
  <text class="h" fill="#fffefa" x="650" y="526">proof, profile, catalog.</text>
  <text class="body" fill="#fffefa" x="650" y="585">The compounding asset is the ledger of</text>
  <text class="body" fill="#fffefa" x="650" y="618">what kind of IRL deserves more capital.</text>

  <rect class="softRed" x="115" y="275" width="310" height="150" rx="24"/>
  <text class="kicker red" x="150" y="325">1. Brief</text>
  <text class="body ink" x="150" y="368">Sponsor perspective, city,</text>
  <text class="body ink" x="150" y="400">audience, guardrails, proof.</text>

  <rect class="softGold" x="545" y="205" width="310" height="150" rx="24"/>
  <text class="kicker gold" x="580" y="255">2. Package supply</text>
  <text class="body ink" x="580" y="298">Host, connector, space,</text>
  <text class="body ink" x="580" y="330">event set, and fit reason.</text>

  <rect class="softBlue" x="945" y="205" width="310" height="150" rx="24"/>
  <text class="kicker blue" x="980" y="255">3. Fund campaign</text>
  <text class="body ink" x="980" y="298">Scope, budget, approvals,</text>
  <text class="body ink" x="980" y="330">and launch checklist.</text>

  <rect class="softGreen" x="1375" y="275" width="310" height="150" rx="24"/>
  <text class="kicker green" x="1410" y="325">4. Govern spend</text>
  <text class="body ink" x="1410" y="368">Spend card, categories,</text>
  <text class="body ink" x="1410" y="400">receipts, anomalies.</text>

  <rect class="softBlue" x="945" y="705" width="310" height="150" rx="24"/>
  <text class="kicker blue" x="980" y="755">5. Capture proof</text>
  <text class="body ink" x="980" y="798">Attendance, claims, content,</text>
  <text class="body ink" x="980" y="830">sentiment, outcome signal.</text>

  <rect class="softGold" x="545" y="705" width="310" height="150" rx="24"/>
  <text class="kicker gold" x="580" y="755">6. Recommend unlock</text>
  <text class="body ink" x="580" y="798">Renew, expand, redesign,</text>
  <text class="body ink" x="580" y="830">or kill with evidence.</text>

  <path class="line" d="M425 330 C465 260 505 255 530 255"/>
  <path class="line" d="M855 280 H920"/>
  <path class="line" d="M1255 280 C1310 280 1335 315 1360 350"/>
  <path class="line" d="M1530 425 C1530 610 1350 760 1280 780"/>
  <path class="line" d="M945 780 H880"/>
  <path class="line" d="M545 780 C385 760 250 625 250 455"/>

  <rect class="dark" x="90" y="925" width="1620" height="76" rx="20"/>
  <text class="m" fill="#fffefa" x="130" y="974">Decision rule:</text>
  <text class="body" fill="#fffefa" x="330" y="974">if a step cannot improve memory, proof, sponsor trust, or host supply, it is not core product work.</text>
</svg>
