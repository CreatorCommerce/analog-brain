<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1050" viewBox="0 0 1800 1050" role="img" aria-labelledby="title desc">
  <title id="title">Three Buyer Lanes One Platform Bet</title>
  <desc id="desc">A clear sponsor-lane diagram showing the best-fit characteristics, buying reason, and renewal proof for eComm brands, tech companies, and public or government funders.</desc>
  <defs>
    <style>
      text { font-family: Inter, Arial, sans-serif; letter-spacing: 0; }
      .bg { fill: #fbf7ef; }
      .ink { fill: #171514; }
      .muted { fill: #5f5952; }
      .paper { fill: #fffefa; stroke: #d7cbbc; stroke-width: 2.5; }
      .dark { fill: #171514; }
      .red { fill: #b9362e; }
      .blue { fill: #2f5ea8; }
      .green { fill: #26796b; }
      .softRed { fill: #fff0ee; stroke: #e6aaa3; stroke-width: 2.5; }
      .softBlue { fill: #edf3ff; stroke: #aac1e6; stroke-width: 2.5; }
      .softGreen { fill: #eaf7f2; stroke: #9bcfc3; stroke-width: 2.5; }
      .title { font-size: 72px; font-weight: 850; }
      .sub { font-size: 31px; font-weight: 500; }
      .badge { font-size: 32px; font-weight: 850; }
      .kicker { font-size: 19px; font-weight: 850; text-transform: uppercase; }
      .h { font-size: 36px; font-weight: 820; }
      .m { font-size: 27px; font-weight: 650; }
      .body { font-size: 22px; font-weight: 520; }
      .small { font-size: 18px; font-weight: 650; }
    </style>
  </defs>

  <rect class="bg" width="1800" height="1050"/>
  <text class="title ink" x="90" y="105">Three Buyer Lanes. One Platform Bet.</text>
  <text class="sub muted" x="92" y="153">Analog should learn which proof language makes sponsor-funded IRL repeat.</text>

  <rect class="softRed" x="90" y="240" width="510" height="660" rx="34"/>
  <rect class="red" x="130" y="285" width="178" height="62" rx="31"/>
  <text class="badge" fill="#fffefa" x="160" y="328">eComm</text>
  <text class="kicker red" x="130" y="405">Best when</text>
  <text class="h ink" x="130" y="452">The product needs</text>
  <text class="h ink" x="130" y="495">trial and ritual.</text>
  <text class="body muted" x="130" y="552">Physical products become believable</text>
  <text class="body muted" x="130" y="586">when people try them in the life</text>
  <text class="body muted" x="130" y="620">they want to repeat.</text>
  <text class="kicker red" x="130" y="680">They buy</text>
  <text class="m ink" x="130" y="727">Funded moments people want.</text>
  <text class="kicker red" x="130" y="782">They renew on</text>
  <text class="body ink" x="130" y="826">Attendance, claims, content,</text>
  <text class="body ink" x="130" y="858">sentiment, repeat participation.</text>

  <rect class="softBlue" x="645" y="240" width="510" height="660" rx="34"/>
  <rect class="blue" x="685" y="285" width="150" height="62" rx="31"/>
  <text class="badge" fill="#fffefa" x="726" y="328">Tech</text>
  <text class="kicker blue" x="685" y="405">Best when</text>
  <text class="h ink" x="685" y="452">Trust beats</text>
  <text class="h ink" x="685" y="495">impressions.</text>
  <text class="body muted" x="685" y="552">A narrow, qualified room is more</text>
  <text class="body muted" x="685" y="586">valuable than another broad digital</text>
  <text class="body muted" x="685" y="620">campaign.</text>
  <text class="kicker blue" x="685" y="680">They buy</text>
  <text class="m ink" x="685" y="727">Rooms with the right people.</text>
  <text class="kicker blue" x="685" y="782">They renew on</text>
  <text class="body ink" x="685" y="826">Qualified attendance, account fit,</text>
  <text class="body ink" x="685" y="858">follow-up, adoption moments.</text>

  <rect class="softGreen" x="1200" y="240" width="510" height="660" rx="34"/>
  <rect class="green" x="1240" y="285" width="245" height="62" rx="31"/>
  <text class="badge" fill="#fffefa" x="1273" y="328">Public/Gov</text>
  <text class="kicker green" x="1240" y="405">Best when</text>
  <text class="h ink" x="1240" y="452">Funding needs</text>
  <text class="h ink" x="1240" y="495">local legitimacy.</text>
  <text class="body muted" x="1240" y="552">Trusted operators can turn public</text>
  <text class="body muted" x="1240" y="586">capital into access, participation,</text>
  <text class="body muted" x="1240" y="620">and visible community value.</text>
  <text class="kicker green" x="1240" y="680">They buy</text>
  <text class="m ink" x="1240" y="727">Access and outcome capacity.</text>
  <text class="kicker green" x="1240" y="782">They renew on</text>
  <text class="body ink" x="1240" y="826">Reach, stewardship, local trust,</text>
  <text class="body ink" x="1240" y="858">and measurable public value.</text>

  <rect class="dark" x="90" y="935" width="1620" height="74" rx="20"/>
  <text class="m" fill="#fffefa" x="130" y="982">Platform bet:</text>
  <text class="body" fill="#fffefa" x="315" y="982">same workflow, different proof language. The early company learns which lane repeats fastest.</text>
</svg>
