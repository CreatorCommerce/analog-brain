<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Analog Supply Decision Map</title>
  <desc id="desc">A decision map for deciding whether Analog should access existing supply, create new supply, publish supply into existence, or prospect off-platform supply.</desc>
  <defs>
    <style>
      .bg { fill: #f8f5ed; }
      .ink { fill: #22201f; }
      .muted { fill: #5e5750; }
      .center { fill: #22201f; }
      .card { fill: #fffdfa; stroke-width: 2; }
      .red { stroke: #e8b8b2; fill: #fff0ee; }
      .gold { stroke: #e8d17b; fill: #fff6d8; }
      .green { stroke: #a9d2c8; fill: #ecf6f2; }
      .blue { stroke: #bac9e2; fill: #eef3fb; }
      .arrow { fill: none; stroke: #6d6259; stroke-width: 4; stroke-linecap: round; marker-end: url(#arrowhead); }
      text { font-family: Poppins, Arial, sans-serif; letter-spacing: 0; }
      .title { font-size: 52px; font-weight: 500; }
      .subtitle { font-size: 24px; font-weight: 400; }
      .label { font-size: 27px; font-weight: 500; }
      .body { font-size: 18px; font-weight: 400; }
      .small { font-size: 16px; font-weight: 400; }
      .centerText { font-size: 30px; font-weight: 500; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#6d6259" />
    </marker>
  </defs>

  <rect class="bg" width="1600" height="1000" />
  <text x="80" y="96" class="title ink">Supply Decision Map</text>
  <text x="80" y="136" class="subtitle muted">When a sponsor wants a city, audience, category, or outcome, decide what kind of supply work is needed.</text>

  <rect x="585" y="365" width="430" height="220" rx="18" class="center" />
  <text x="640" y="430" class="centerText" fill="#f8f5ed">What does this market</text>
  <text x="680" y="470" class="centerText" fill="#f8f5ed">need right now?</text>
  <text x="655" y="520" class="body" fill="#f2c94c">Pick the motion that creates</text>
  <text x="645" y="548" class="body" fill="#f2c94c">a product object fastest.</text>

  <rect x="90" y="230" width="420" height="230" rx="14" class="card red" />
  <text x="130" y="285" class="label ink">Access existing supply</text>
  <text x="130" y="330" class="body muted">Use when a trusted host, venue,</text>
  <text x="130" y="358" class="body muted">community, or ritual already exists.</text>
  <text x="130" y="405" class="small ink">Output:</text>
  <text x="195" y="405" class="small muted">catalog record, host profile,</text>
  <text x="130" y="430" class="small muted">sponsor package, event-set prospect</text>

  <rect x="1090" y="230" width="420" height="230" rx="14" class="card gold" />
  <text x="1130" y="285" class="label ink">Create missing supply</text>
  <text x="1130" y="330" class="body muted">Use when demand exists but the</text>
  <text x="1130" y="358" class="body muted">host, space, operator, or path is missing.</text>
  <text x="1130" y="405" class="small ink">Output:</text>
  <text x="1195" y="405" class="small muted">grant, owned IRL lab,</text>
  <text x="1130" y="430" class="small muted">Activation Opportunity, asset-need note</text>

  <rect x="90" y="615" width="420" height="230" rx="14" class="card green" />
  <text x="130" y="670" class="label ink">Publish supply into view</text>
  <text x="130" y="715" class="body muted">Use when the city has energy but</text>
  <text x="130" y="743" class="body muted">sponsors cannot see the market yet.</text>
  <text x="130" y="790" class="small ink">Output:</text>
  <text x="195" y="790" class="small muted">Connector profile, field story,</text>
  <text x="130" y="815" class="small muted">social clip, print feature, sponsor lead</text>

  <rect x="1090" y="615" width="420" height="230" rx="14" class="card blue" />
  <text x="1130" y="670" class="label ink">Prospect off-platform</text>
  <text x="1130" y="715" class="body muted">Use when the sponsor brief is clear</text>
  <text x="1130" y="743" class="body muted">and the right hosts probably exist.</text>
  <text x="1130" y="790" class="small ink">Output:</text>
  <text x="1195" y="790" class="small muted">applications, direct invites,</text>
  <text x="1130" y="815" class="small muted">collabs, outreach, catalog updates</text>

  <path d="M585 430 C535 395 515 360 510 345" class="arrow" />
  <path d="M1015 430 C1065 395 1085 360 1090 345" class="arrow" />
  <path d="M585 540 C535 590 515 665 510 730" class="arrow" />
  <path d="M1015 540 C1065 590 1085 665 1090 730" class="arrow" />

  <rect x="560" y="760" width="480" height="105" rx="12" fill="#fffdfa" stroke="#ded5c7" stroke-width="2" />
  <text x="600" y="805" class="label ink">Simple rule</text>
  <text x="600" y="840" class="body muted">A list is not progress until it becomes</text>
  <text x="600" y="867" class="body muted">qualified supply, proof, media, or a repeatable playbook.</text>
</svg>
