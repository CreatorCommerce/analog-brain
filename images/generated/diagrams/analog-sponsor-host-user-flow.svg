<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Analog Sponsor And Host User Flow</title>
  <desc id="desc">A swimlane user flow showing how sponsors, Analog operators, city leads, and hosts move from a sponsor goal to an approved activation, proof, and renewal.</desc>
  <defs>
    <style>
      .bg { fill: #f8f5ed; }
      .ink { fill: #22201f; }
      .muted { fill: #5e5750; }
      .laneLine { stroke: #ddd3c4; stroke-width: 2; }
      .sponsor { fill: #fff0ee; stroke: #e8b8b2; stroke-width: 2; }
      .analog { fill: #fff6d8; stroke: #e8d17b; stroke-width: 2; }
      .host { fill: #ecf6f2; stroke: #a9d2c8; stroke-width: 2; }
      .product { fill: #eef3fb; stroke: #bac9e2; stroke-width: 2; }
      .arrow { fill: none; stroke: #6d6259; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowhead); }
      text { font-family: Poppins, Arial, sans-serif; letter-spacing: 0; }
      .title { font-size: 52px; font-weight: 500; }
      .subtitle { font-size: 24px; font-weight: 400; }
      .lane { font-size: 24px; font-weight: 500; }
      .label { font-size: 20px; font-weight: 500; }
      .body { font-size: 15px; font-weight: 400; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#6d6259" />
    </marker>
  </defs>

  <rect class="bg" width="1600" height="1000" />
  <text x="80" y="96" class="title ink">Sponsor + Host User Flow</text>
  <text x="80" y="136" class="subtitle muted">What each actor does, in plain English, from sponsor goal to renewal decision.</text>

  <line x1="80" y1="245" x2="1520" y2="245" class="laneLine" />
  <line x1="80" y1="415" x2="1520" y2="415" class="laneLine" />
  <line x1="80" y1="585" x2="1520" y2="585" class="laneLine" />
  <line x1="80" y1="755" x2="1520" y2="755" class="laneLine" />

  <text x="95" y="220" class="lane ink">Sponsor</text>
  <text x="95" y="390" class="lane ink">Analog operator</text>
  <text x="95" y="560" class="lane ink">City lead / host</text>
  <text x="95" y="730" class="lane ink">Platform</text>

  <rect x="245" y="170" width="185" height="95" rx="12" class="sponsor" />
  <text x="270" y="205" class="label ink">Goal + budget</text>
  <text x="270" y="235" class="body muted">What audience, city,</text>
  <text x="270" y="257" class="body muted">category, or outcome?</text>

  <rect x="500" y="340" width="185" height="95" rx="12" class="analog" />
  <text x="525" y="375" class="label ink">Write brief</text>
  <text x="525" y="405" class="body muted">Guardrails, proof,</text>
  <text x="525" y="427" class="body muted">budget, host shape</text>

  <rect x="755" y="510" width="185" height="95" rx="12" class="host" />
  <text x="780" y="545" class="label ink">Source fit</text>
  <text x="780" y="575" class="body muted">City lead finds or</text>
  <text x="780" y="597" class="body muted">creates host option</text>

  <rect x="1010" y="510" width="185" height="95" rx="12" class="host" />
  <text x="1035" y="545" class="label ink">Host accepts</text>
  <text x="1035" y="575" class="body muted">Scope, spend, tasks,</text>
  <text x="1035" y="597" class="body muted">proof expectations</text>

  <rect x="1265" y="170" width="185" height="95" rx="12" class="sponsor" />
  <text x="1290" y="205" class="label ink">Approve</text>
  <text x="1290" y="235" class="body muted">Sponsor says yes</text>
  <text x="1290" y="257" class="body muted">to host + terms</text>

  <rect x="500" y="680" width="185" height="95" rx="12" class="product" />
  <text x="525" y="715" class="label ink">Campaign</text>
  <text x="525" y="745" class="body muted">Event set, collab,</text>
  <text x="525" y="767" class="body muted">host event</text>

  <rect x="755" y="680" width="185" height="95" rx="12" class="product" />
  <text x="780" y="715" class="label ink">Spend + page</text>
  <text x="780" y="745" class="body muted">Budget rules, RSVP,</text>
  <text x="780" y="767" class="body muted">claims, checklist</text>

  <rect x="1010" y="680" width="185" height="95" rx="12" class="product" />
  <text x="1035" y="715" class="label ink">Proof packet</text>
  <text x="1035" y="745" class="body muted">Receipts, media,</text>
  <text x="1035" y="767" class="body muted">attendance, notes</text>

  <rect x="1265" y="680" width="185" height="95" rx="12" class="product" />
  <text x="1290" y="715" class="label ink">Unlock</text>
  <text x="1290" y="745" class="body muted">Renew, expand,</text>
  <text x="1290" y="767" class="body muted">pause, or redesign</text>

  <path d="M430 218 C465 218 470 386 500 386" class="arrow" />
  <path d="M685 386 C720 386 720 558 755 558" class="arrow" />
  <path d="M940 558 H997" class="arrow" />
  <path d="M1195 558 C1240 558 1220 218 1252 218" class="arrow" />
  <path d="M1358 265 V635 C1358 670 650 640 593 680" class="arrow" />
  <path d="M685 728 H742" class="arrow" />
  <path d="M940 728 H997" class="arrow" />
  <path d="M1195 728 H1252" class="arrow" />

  <rect x="80" y="845" width="1440" height="70" rx="12" fill="#22201f" />
  <text x="120" y="889" class="label" fill="#fbf8f1">Plain English:</text>
  <text x="268" y="889" class="body" fill="#fbf8f1">Analog keeps sponsors, hosts, and operators moving through one shared workflow instead of managing every activation in loose documents and chats.</text>
</svg>
