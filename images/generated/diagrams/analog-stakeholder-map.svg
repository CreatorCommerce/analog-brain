<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Analog Stakeholder Map</title>
  <desc id="desc">A stakeholder map showing what employees, investors, early sponsor customers, hosts and connectors, city leads, and partners need to understand about Analog.</desc>
  <defs>
    <style>
      .bg { fill: #fbf8f1; }
      .ink { fill: #22201f; }
      .muted { fill: #5e5750; }
      .center { fill: #22201f; }
      .card { fill: #fffdfa; stroke: #ded5c7; stroke-width: 2; }
      .red { fill: #fff0ee; stroke: #e8b8b2; stroke-width: 2; }
      .gold { fill: #fff6d8; stroke: #e8d17b; stroke-width: 2; }
      .green { fill: #ecf6f2; stroke: #a9d2c8; stroke-width: 2; }
      .blue { fill: #eef3fb; stroke: #bac9e2; stroke-width: 2; }
      .arrow { fill: none; stroke: #6d6259; stroke-width: 4; stroke-linecap: round; marker-end: url(#arrowhead); }
      text { font-family: Poppins, Arial, sans-serif; letter-spacing: 0; }
      .title { font-size: 52px; font-weight: 500; }
      .subtitle { font-size: 24px; font-weight: 400; }
      .label { font-size: 25px; font-weight: 500; }
      .body { font-size: 17px; font-weight: 400; }
      .small { font-size: 15px; font-weight: 400; }
      .centerLabel { font-size: 33px; font-weight: 500; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#6d6259" />
    </marker>
  </defs>

  <rect class="bg" width="1600" height="1000" />
  <text x="80" y="96" class="title ink">Company Stakeholder Map</text>
  <text x="80" y="136" class="subtitle muted">One company narrative, translated into what each group needs to trust.</text>

  <circle cx="800" cy="500" r="168" class="center" />
  <text x="704" y="470" class="centerLabel" fill="#fbf8f1">Analog</text>
  <text x="650" y="515" class="body" fill="#f2c94c">Sponsor budget -> trusted supply</text>
  <text x="674" y="548" class="body" fill="#f2c94c">-> spend -> proof -> unlock</text>

  <rect x="90" y="210" width="390" height="160" rx="14" class="red" />
  <text x="130" y="260" class="label ink">Employees</text>
  <text x="130" y="300" class="body muted">What work matters?</text>
  <text x="130" y="330" class="small muted">Repeatable product objects, proof,</text>
  <text x="130" y="354" class="small muted">supply intelligence, customer learning.</text>

  <rect x="1120" y="210" width="390" height="160" rx="14" class="gold" />
  <text x="1160" y="260" class="label ink">Investors</text>
  <text x="1160" y="300" class="body muted">Why can this become a company?</text>
  <text x="1160" y="330" class="small muted">Causeways where budget, trust, media,</text>
  <text x="1160" y="354" class="small muted">proof, and software compound.</text>

  <rect x="90" y="610" width="390" height="160" rx="14" class="blue" />
  <text x="130" y="660" class="label ink">Early sponsor customers</text>
  <text x="130" y="700" class="body muted">What do we get?</text>
  <text x="130" y="730" class="small muted">Safer IRL participation with approved</text>
  <text x="130" y="754" class="small muted">hosts, governed spend, and proof.</text>

  <rect x="1120" y="610" width="390" height="160" rx="14" class="green" />
  <text x="1160" y="660" class="label ink">Hosts + connectors</text>
  <text x="1160" y="700" class="body muted">Why should we care?</text>
  <text x="1160" y="730" class="small muted">A path from hidden trust labor to</text>
  <text x="1160" y="754" class="small muted">funded, respected, repeat work.</text>

  <rect x="605" y="170" width="390" height="135" rx="14" class="card" />
  <text x="645" y="220" class="label ink">City leads</text>
  <text x="645" y="260" class="body muted">Turn local trust into packages,</text>
  <text x="645" y="288" class="body muted">media, profiles, and supply intelligence.</text>

  <rect x="605" y="745" width="390" height="135" rx="14" class="card" />
  <text x="645" y="795" class="label ink">Partners</text>
  <text x="645" y="835" class="body muted">Embed sponsor, proof, and funding</text>
  <text x="645" y="863" class="body muted">logic while keeping their own surface.</text>

  <path d="M480 290 C575 315 630 370 675 415" class="arrow" />
  <path d="M1120 290 C1025 315 970 370 925 415" class="arrow" />
  <path d="M480 690 C575 665 630 610 675 565" class="arrow" />
  <path d="M1120 690 C1025 665 970 610 925 565" class="arrow" />
  <path d="M800 305 V320" class="arrow" />
  <path d="M800 745 V680" class="arrow" />

  <rect x="320" y="905" width="960" height="45" rx="10" fill="#22201f" />
  <text x="355" y="935" class="body" fill="#fbf8f1">Stakeholder promise: each group should understand the motion, the evidence, and the next decision Analog helps make.</text>
</svg>
